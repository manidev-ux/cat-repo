name: Deploy React App

on:
push:
branches: [ "main" ]

permissions:
contents: write

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install Dependencies
    run: npm install

  - name: Build Project
    run: npm run build

  - name: Deploy to GitHub Pages
    uses: peaceiris/actions-gh-pages@v4
    with:
      publish_dir: ./dist
```
