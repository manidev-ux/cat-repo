name: Docker CI/CD

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Build Docker Image
    run: docker build -t vite-react-app .

  - name: Run Docker Container
    run: docker run -d -p 5173:5173 vite-react-app
```
